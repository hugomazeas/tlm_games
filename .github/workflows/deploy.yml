name: Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy to tlmhub.space
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: raccoon.tlmhub.space
          port: 2222
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/tlm/tlm_games
            git pull
            make cache
